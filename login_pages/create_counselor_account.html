<!DOCTYPE html>
<html>
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="stylesheet" href="create_counselor_account.css" />
    </head>
    <body>

        <h2>Create Counselor Account</h2>

        <form action="create_counselor_account.php" method="post">
            <div class="container">
                <fieldset>

                    <legend>Personal Information</legend>
                    <label for="fname"><b>First Name *</b></label>
                    <input type="text" placeholder="Enter First Name" name="fname" required>

                    <label for="mname"><b>Middle Name</b></label>
                    <input type="text" placeholder="Enter Middle Name" name="mname" />

                    <label for="lname"><b>Last Name</b></label>
                    <input type="text" placeholder="Enter Last Name" name="lname" required>

                    <label for="dob"><b>Date Of Birth *</b></label>
                    <input type="date" name="dob" required />

                    <label for="gender"><b>Gender *</b></label>
                    <select name="gender" required>
                        <option value = "male">Male</option>
                        <option value = "female">Female</option>
                        <option value = "no_gender_disclose">Don't want to disclose</option>
                    </select>

                    <label for="fathers name"><b>Father's Name *</b></label>
                    <input type="text" placeholder="Enter Father's Name" name="fathers name" required>

                    <label for="mothers name"><b>Mother's Name *</b></label>
                    <input type="text" placeholder="Enter Mother's Name" name="mothers name" required>

                    <label for="mobile number"><b>Mobile Number *</b></label>
                    <input type="tel" maxlength=10 required>
                </fieldset>

                <fieldset>
                    <legend>Documents</legend>
                    
                    <br>
                    <label for="photo"><b>Photo *</b></label>
                    <input type="file" name="photo" required>

                    <label for="cv"><b>Curriculum Vitae *</b></label>
                    <input type="file" name="cv" required>

                    <label for="marks card"><b>Marks Card *</b></label>
                    <input type="file" name="marks_card" required>

                    <label for="Motivation Letter"><b>Motivation Letter *</b></label>
                    <input type="file" name="motivation_letter" required>

                    <label for="Reasoning"><b>Reasoning *</b></label>
                    <p>1. Some questions in pointwise</p>
                    <textarea name="reasoning" required></textarea>
                </fieldset>

                <fieldset>
                    <legend>Account Information</legend>
                    <label for="uname"><b>Username *</b></label>
                    <input type="text" placeholder="Enter Username" name="uname" required>

                    <label for="psw"><b>Password *</b></label>
                    <input type="password" placeholder="Enter Password" name="psw" required>

                </fieldset>
                <input type="checkbox" id="terms_and_conditions_checkbox" required /><label for="terms and conditions">I agree to the <a href="terms_and_conditions.html">terms and conditions</a></label>
                <button type="submit">Create Account</button>
            </div>

        </form>

    </body>
</html>
